<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="modern-normalize.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Library</h1>

    <table class="library-table" id="library-table">
        <caption>My Library Collection</caption>

        <thead>
            <tr>
                <th>Action</th>
                <th>Id</th>
                <th>Title</th>
                <th>Author</th>
                <th>Pages</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="library-table-body">
        </tbody>
    </table>

    <button command="show-modal" commandfor="add-book">Add Book</button>
    <button id="clearLibrary" >Clear Library</button>

    <dialog id="add-book">
        <h3>Book Form</h3>
        <form action="">
            <p>
                <label for="book-title">Title</label>
                <input type="text" id="book-title" name="book-title">
            </p>
            <p>
                <label for="book-author">Author</label>
                <input type="text" id="book-author" name="book-author">
            </p>
            <p>
                <label for="book-pages">Pages</label>
                <input type="number" min="1" id="book-pages" name="book-pages">
            </p>

            <fieldset>
                <legend for="book-read">Status</legend>
                
                <input type="radio" name="read" id="read-true" value="true">
                <label for="read-true">Read</label>
                
                <input type="radio" name="read" id="read-false" value="false">
                <label for="read-false">Not Read Yet</label>
            </fieldset>

            <button type="submit" class="btn" id="add-btn">Add</button>
        </form>

        <button commandfor="add-book" command="close" class="close-btn">X</button>
    </dialog>

    <script src="script.js"></script>
</body>

</html>
